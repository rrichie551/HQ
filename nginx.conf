# Conditional `Connection` header: "upgrade" when the request actually
# carries an Upgrade header (WebSockets), "close" otherwise. Lets every
# `location` block proxy plain HTTP AND WebSocket without separate rules.
map $http_upgrade $mc_connection_upgrade {
  default upgrade;
  ''      close;
}

upstream mission_control_app {
  server app:3000;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 4m;

  # Explicit Socket.io block (kept for clarity)
  location /socket.io/ {
    proxy_pass http://mission_control_app;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 86400;
  }

  # Admin terminal WebSocket — bidirectional, long-lived. The dashboard
  # proxies onward to the host-side bridge.
  location /api/admin/term {
    proxy_pass http://mission_control_app;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
  }

  # Everything else — plain HTTP, but pass through WS upgrades when
  # they happen on other future paths via $mc_connection_upgrade.
  location / {
    proxy_pass http://mission_control_app;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $mc_connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
