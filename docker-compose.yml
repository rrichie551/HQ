version: "3.9"

services:
  app:
    build: .
    container_name: mission-control-app
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Inside the container, Hermes' files are mounted at /hermes.
      # We override HERMES_DIR so the admin UI reads the mounted path.
      - HERMES_DIR=/hermes
    volumes:
      - ./data:/app/data
      # Mount the host's Hermes install read-write so /admin can manage it.
      # HERMES_DIR is set in .env (defaults to /root/.hermes for typical
      # single-VPS installs). Falls back gracefully if the path doesn't exist —
      # the admin UI will just show an empty/uninstalled state.
      - ${HERMES_DIR:-/root/.hermes}:/hermes
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: mission-control-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      # Mission Control listens on 4180 to avoid clashing with anything
      # already bound to :80 (Apache, host nginx, Cloudflare Tunnel, …).
      # Override here if you want a different one for this client.
      - "4180:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
